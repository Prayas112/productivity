                <form>
                <input id="task" type="text" placeholder="enter task">
                <textarea placeholder="enter description" name="" id=""></textarea>
                <div class="mark-imp">
                    <input type="checkbox" name="" id="check">
                    <label for="check">mark as important</label>
                </div>
                <button class="bt">Add task</button>
                </form>

           <div class="motivational-qute">

            </div>
